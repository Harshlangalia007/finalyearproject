{% load static %}
<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Meetings & Productivity AI</title>
        <!-- Bootstrap CSS -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="{% static 'css/style.css' %}" />
    </head>
    <body class="{% block body_class %}{% endblock %}">
        <header class="landing-shell app-shell">
            <nav class="landing-nav">
                <a class="landing-brand" href="/">Meetings AI</a>
                <div class="landing-nav-links">
                    <a href="/meetings/">Meetings</a>
                    <a href="/email/">Email AI</a>
                    <a href="/accounts/login/" class="nav-outline">Log In</a>
                    <a href="/users/register/" class="nav-solid">Get Started</a>
                </div>
            </nav>
        </header>
        <main class="app-content">{% block content %}{% endblock %}</main>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script src="{% static 'js/main.js' %}"></script>
    </body>
</html>
